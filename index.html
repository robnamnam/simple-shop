<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
        // Apply saved theme before paint to avoid FOUC.
        try {
            var t = localStorage.getItem('portfolio:theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch (_) {}
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">ARTWORK</div>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
                        <span id="theme-toggle-icon" aria-hidden="true">&#9728;</span>
                    </button>
                </li>
                <li>
                    <a href="#" id="cart-button" class="cart-button" aria-label="Open cart">
                        <span class="cart-icon" aria-hidden="true">&#x1F6D2;</span>
                        <span id="cart-count" class="cart-count" style="display:none;">0</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
<img src="https://picsum.photos/1200/600?random=1" alt="Featured Art 1">
                        <div class="carousel-caption">
                            <h2>The Eternal Flow</h2>
                        </div>
                    </div>
                    <div class="carousel-item">
<img src="https://picsum.photos/1200/600?random=2" alt="Featured Art 2">
                        <div class="carousel-caption">
                            <h2>Urban Silence</h2>
                        </div>
                    </div>
                    <div class="carousel-item">
<img src="https://picsum.photos/1200/600?random=3" alt="Featured Art 3">
                        <div class="carousel-caption">
                            <h2>Crimson Dreams</h2>
                        </div>
                    </div>
                </div>
                <button class="carousel-prev"><</button>
                <button class="carousel-next">></button>
            </div>
        </section>

        <section class="gallery">
            <div class="gallery-grid" id="gallery-grid">
                <!-- Projects are loaded dynamically from projects/manifest.json -->
                <p style="grid-column:1/-1;text-align:center;color:#888;padding:2rem;">Loading…</p>
            </div>
        </section>
    </main>

    <!-- Project Overlay -->
    <div id="project-overlay" class="project-overlay">
        <div class="project-overlay-panel">
            <button class="overlay-close">&#x2715;</button>

            <div class="overlay-gallery">
                <div class="overlay-main-image-wrap">
                    <img id="overlay-main-img" src="" alt="">
                    <button class="overlay-img-prev">&#8249;</button>
                    <button class="overlay-img-next">&#8250;</button>
                </div>
                <div class="overlay-thumbnails" id="overlay-thumbnails"></div>
            </div>

            <div class="overlay-info">
                <p class="overlay-category" id="overlay-category"></p>
                <h2 class="overlay-title" id="overlay-title"></h2>
                <p class="overlay-description" id="overlay-description"></p>

                <div class="overlay-meta">
                    <div class="meta-row">
                        <span class="meta-label">Year</span>
                        <span class="meta-value" id="overlay-year"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Medium</span>
                        <span class="meta-value" id="overlay-medium"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Dimensions</span>
                        <span class="meta-value" id="overlay-dimensions"></span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-label">Edition</span>
                        <span class="meta-value" id="overlay-edition"></span>
                    </div>
                </div>

                <div class="overlay-purchase">
                    <div class="overlay-price-row">
                        <span class="overlay-price" id="overlay-price"></span>
                        <span class="overlay-status-badge" id="overlay-status-badge"></span>
                    </div>
                    <div class="overlay-stock" id="overlay-stock" hidden></div>
                    <div class="overlay-qty" id="overlay-qty" hidden>
                        <span class="overlay-qty-label">Quantity</span>
                        <div class="cart-qty-stepper" role="group" aria-label="Quantity">
                            <button class="cart-qty-btn" id="overlay-qty-dec" aria-label="Decrease">−</button>
                            <span class="cart-qty-value" id="overlay-qty-value">1</span>
                            <button class="cart-qty-btn" id="overlay-qty-inc" aria-label="Increase">+</button>
                        </div>
                    </div>
                    <button class="btn-add-to-cart" id="btn-add-to-cart">Add to Cart</button>
                    <button class="btn-enquire" id="btn-enquire">Enquire</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-drawer-backdrop" class="cart-drawer-backdrop"></div>
    <aside id="cart-drawer" class="cart-drawer" aria-hidden="true">
        <header class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button id="cart-close" class="cart-drawer-close" aria-label="Close cart">&#x2715;</button>
        </header>
        <div class="cart-drawer-body">
            <p id="cart-empty" class="cart-empty">Your cart is empty.</p>
            <div id="cart-items"></div>
        </div>
        <footer class="cart-drawer-footer">
            <div class="cart-drawer-totals">
                <span>Subtotal</span>
                <span id="cart-total">€ 0,00</span>
            </div>
            <button id="cart-checkout" class="btn-checkout" disabled>Checkout</button>
        </footer>
    </aside>

    <!-- Cart toast -->
    <div id="cart-toast" class="cart-toast"></div>

    <footer>
        <p>&copy; 2026 Artwork Portfolio. Built with simplicity.</p>
    </footer>

    <script src="cart.js"></script>
    <script src="script.js"></script>
</body>
</html>
